openapi: 3.0.0
info:
  title: CoursePush Admin API
  version: 1.0.0
  description: CoursePush 管理后台 API 接口文档
servers:
  - url: http://localhost:3100/api/v1
    description: 本地开发环境
paths:
  # 认证与用户相关
  /auth/register:
    post:
      summary: 注册账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - displayName
              properties:
                username:
                  type: string
                password:
                  type: string
                displayName:
                  type: string
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      userId:
                        type: integer
                      username:
                        type: string
        '422':
          description: 参数校验失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: 登录并返回用户信息
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      userId:
                        type: integer
                      username:
                        type: string
                      displayName:
                        type: string
        '401':
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/me:
    get:
      summary: 获取当前用户信息
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: 缺少X-User-Id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: 更新当前用户昵称
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # 学期管理相关
  /semesters:
    get:
      summary: 列出当前用户的学期
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 创建学期
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                semesterName:
                  type: string
                totalWeeks:
                  type: integer
                currentWeek:
                  type: integer
                isActive:
                  type: boolean
                status:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /semesters/{semesterId}:
    parameters:
      - name: semesterId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    patch:
      summary: 更新学期字段
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                semesterName:
                  type: string
                totalWeeks:
                  type: integer
                currentWeek:
                  type: integer
                isActive:
                  type: boolean
                status:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      summary: 删除指定学期
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /semesters/{semesterId}/activate:
    parameters:
      - name: semesterId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    post:
      summary: 设为激活学期
      responses:
        '200':
          description: 操作成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # 课程与标签相关
  /courses:
    get:
      summary: 筛选课程
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
        - name: semesterId
          in: query
          schema:
            type: integer
        - name: weekNumber
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 创建课程
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tagTemplateIds:
                  type: array
                  items:
                    type: integer
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /courses/{courseId}:
    parameters:
      - name: courseId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    patch:
      summary: 更新课程字段
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      summary: 删除课程
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /tag-templates:
    get:
      summary: 列出标签模板
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 新建标签模板
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          description: 标签重复
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tag-templates/{tagId}:
    parameters:
      - name: tagId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    patch:
      summary: 修改标签模板
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      summary: 删除标签模板
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # 作息、Bark推送与通知日志
  /time-slots:
    get:
      summary: 获取节次配置
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 新增节次
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                periodOrder:
                  type: integer
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /time-slots/{slotId}:
    parameters:
      - name: slotId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    patch:
      summary: 更新节次
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      summary: 删除节次
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /bark/settings:
    get:
      summary: 获取Bark推送设置
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    put:
      summary: 更新推送设置
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                barkKey:
                  type: string
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /notifications/logs:
    get:
      summary: 查看推送日志
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 写入推送日志
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: 写入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # App 版本管理相关
  /app-versions:
    get:
      summary: 列出版本记录
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          schema:
            type: integer
            description: '1: Android, 2: iOS'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    post:
      summary: 创建版本记录
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - appPlatform
                - versionCode
                - versionName
                - downloadUrl
              properties:
                appPlatform:
                  type: integer
                versionCode:
                  type: integer
                versionName:
                  type: string
                downloadUrl:
                  type: string
                updateDesc:
                  type: string
                isForce:
                  type: boolean
                isCurrent:
                  type: boolean
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /app-versions/latest:
    get:
      summary: 获取最新版本
      parameters:
        - name: X-User-Id
          in: header
          required: true
          schema:
            type: integer
        - name: platform
          in: query
          required: true
          schema:
            type: integer
            description: '1: Android, 2: iOS'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /app-versions/{versionId}:
    parameters:
      - name: versionId
        in: path
        required: true
        schema:
          type: integer
      - name: X-User-Id
        in: header
        required: true
        schema:
          type: integer
    patch:
      summary: 更新版本记录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

    delete:
      summary: 删除版本记录
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        meta:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            details:
              type: object
              nullable: true