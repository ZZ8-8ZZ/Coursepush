  /ai/analysis:
    post:
      summary: 获取 AI 本周课程分析与建议
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - courses
                - weekNum
              properties:
                courses:
                  type: array
                  items:
                    $ref: '#/components/schemas/Course'
                weekNum:
                  type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      analysis:
                        type: string
        '400':
          description: 参数错误
        '401':
          description: 未登录或令牌无效

  /ai/chat:
    post:
      summary: 与 AI 进行通用对话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - messages
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    required:
                      - role
                      - content
                    properties:
                      role:
                        type: string
                        enum: [system, user, assistant]
                      content:
                        type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      response:
                        type: string
        '401':
          description: 未登录或令牌无效

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 使用登录/注册接口返回的 JWT 令牌，格式为 `Bearer <token>`

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          additionalProperties: true
        meta:
          type: object
          nullable: true
          additionalProperties: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            message:
              type: string
            details:
              type: object
              nullable: true
              additionalProperties: true

    Course:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        teacher:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        dayOfWeek:
          type: integer
          minimum: 1
          maximum: 7
        startPeriod:
          type: integer
        endPeriod:
          type: integer
        weekPattern:
          type: string
          enum: [all, odd, even, custom]
        weekStart:
          type: integer
        weekEnd:
          type: integer
        tagType:
          type: string
        tagName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        tagTemplateIds:
          type: array
          items:
            type: integer
